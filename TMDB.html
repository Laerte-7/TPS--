<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

header {
    text-align: center;
    margin-bottom: 30px;
}

h1 {
    color: #38bdf8;
}

.search-container {
    text-align: center;
    margin-bottom: 25px;
}

input {
    width: 300px;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #334155;
    text-align: left;
}

th {
    background: #0ea5e9;
}

.poster {
    width: 80px;
    border-radius: 6px;
}

#error {
    text-align: center;
    color: #ef4444;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <h1>🎬 Movie Dashboard</h1>
    <p>Ricerca film tramite API TMDB</p>
</header>

<div class="search-container">
    <input type="text" id="movieInput" placeholder="Inserisci un film...">
    <button onclick="searchMovie()">Cerca</button>
</div>

<div id="error"></div>

<table id="movieTable">
    <thead>
        <tr>
            <th>Poster</th>
            <th>Titolo</th>
            <th>Data Uscita</th>
            <th>Voto</th>
            <th>Trama</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const API_KEY = "ee01c3cca92c802c7e88f89c1d2eb213";

async function searchMovie() {

    const query = document.getElementById("movieInput").value;
    const tbody = document.querySelector("#movieTable tbody");
    const errorDiv = document.getElementById("error");

    tbody.innerHTML = "";
    errorDiv.textContent = "";

    if (!query) {
        errorDiv.textContent = "Inserisci il nome di un film.";
        return;
    }

    try {

        const response = await fetch(
            `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=it-IT&query=${encodeURIComponent(query)}`
        );

        if (!response.ok) {
            throw new Error("Errore API");
        }

        const data = await response.json();

        if (data.results.length === 0) {
            errorDiv.textContent = "Nessun film trovato.";
            return;
        }

        data.results.forEach(movie => {

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>
                    ${
                        movie.poster_path
                        ? `<img class="poster"
                           src="https://image.tmdb.org/t/p/w200${movie.poster_path}">`
                        : "N/A"
                    }
                </td>
                <td>${movie.title}</td>
                <td>${movie.release_date || "N/D"}</td>
                <td>${movie.vote_average}</td>
                <td>${movie.overview || "Nessuna descrizione"}</td>
            `;

            tbody.appendChild(row);
        });

    } catch (error) {
        errorDiv.textContent =
            "Errore durante il recupero dei dati.";
        console.error(error);
    }
}
</script>

</body>
</html>
